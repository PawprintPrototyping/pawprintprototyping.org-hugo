############################ call to action ###########################
cta:
  enable : true
  bg_image : "images/call-to-action-bg.jpg"
  title : "<div id='membership'>Become A Member</div>"
  content : "Like what we do? We'd love to have you onboard!
            <br><br>
            Member support is crucial to the continuing mission of Pawprint Prototyping.
            Members support the space financially, help educate the greater Papwrint community
            through knowledge sharing and classes, and generally pitch in to keep our space
            running in tip-top shape!
            <br><br>
            <em>We accept membership applications at our general body
            meetings, which can be found on our <a style='color:lightblue;' href='/pages/calendar/'>calendar</a>.
            These meetings are open to all, even if you're just
            curious!
            <br><br>
            Membership dues are $100/mo and include 24/7 access to our
            space and tools.  </em>"
  button:
    enable : true
    label : "Contact Us"
    link : "contact"

